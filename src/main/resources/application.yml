server:
  port: 8080

spring:
  application:
    name: seckill-zc
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/seckill?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    druid:
      # 连接池大小
      initial-size: 5
      min-idle: 5
      max-active: 20
      # 获取连接最大等待时间(ms)
      max-wait: 60000
      # 检测需要关闭的空闲连接的间隔(ms)
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      # 连接有效性校验
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 开启 SQL 监控(stat)；不开 wall 以免对 H2 方言做防火墙拦截
      filters: stat
      # Druid 监控后台
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      web-stat-filter:
        enabled: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
